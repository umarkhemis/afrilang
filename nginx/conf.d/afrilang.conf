# ============================================================
# AfriLang – Nginx Virtual Host
#
# Replace YOUR_DOMAIN with your actual domain, e.g. api.afrilang.io
#
# SSL setup (Let's Encrypt via Certbot):
#   certbot certonly --standalone -d YOUR_DOMAIN
#   # Certs go to /etc/letsencrypt/live/YOUR_DOMAIN/
#   # Then copy/symlink into nginx/ssl/
# ============================================================

# ── HTTP: redirect all traffic to HTTPS ─────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    # Let's Encrypt ACME challenge (for cert renewal)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS: main API server ───────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name YOUR_DOMAIN;

    # ── SSL certificates ─────────────────────────────────
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    # Modern TLS config (TLS 1.2 + 1.3 only)
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;

    # HSTS (tell browsers to always use HTTPS for 1 year)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── CORS headers ─────────────────────────────────────
    # AfriLang handles its own CORS, but Nginx adds these for preflight
    add_header Access-Control-Allow-Origin  "*"                          always;
    add_header Access-Control-Allow-Methods "GET, POST, OPTIONS, DELETE" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With" always;

    # Handle OPTIONS preflight quickly at Nginx level
    if ($request_method = OPTIONS) {
        return 204;
    }

    # ── Auth endpoints: strict rate limiting ─────────────
    location /api/v1/auth/ {
        limit_req zone=auth burst=10 nodelay;
        proxy_pass http://afrilang_api;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # ── STT upload: strict rate + large body allowed ─────
    location /api/v1/speech/stt {
        limit_req zone=upload burst=5 nodelay;
        client_max_body_size 15M;
        proxy_pass http://afrilang_api;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # ── All other API endpoints ───────────────────────────
    location /api/ {
        limit_req zone=global burst=50 nodelay;
        proxy_pass http://afrilang_api;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # ── Docs, health, root ────────────────────────────────
    location ~ ^/(docs|redoc|openapi\.json|health|) {
        proxy_pass http://afrilang_api;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # ── Block common attack vectors ───────────────────────
    location ~ /\. {
        deny all;
        return 404;
    }

    location = /favicon.ico { return 204; }
    location = /robots.txt  { return 200 "User-agent: *\nDisallow: /api/\n"; }
}
